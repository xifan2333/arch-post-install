# Herdr — layout / agents / sessions
# Prefix only: Ctrl+a (tmux-style). Do not bind Ctrl+Alt here — that is WezTerm's layer.

onboarding = false

[theme]
# Follow host terminal ANSI (WezTerm theme). Built-ins have no everforest.
name = "terminal"

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[update]
channel = "stable"

[keys]
prefix = "ctrl+a"

help = "prefix+?"
settings = "prefix+s"
detach = "prefix+q"
reload_config = "prefix+shift+r"
open_notification_target = "prefix+o"

workspace_picker = "prefix+w"
goto = "prefix+g"
new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+g"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
toggle_sidebar = "prefix+b"

# Tabs (prefix only)
new_tab = "prefix+c"
previous_tab = "prefix+["
next_tab = "prefix+]"
switch_tab = "prefix+1..9"
close_tab = "prefix+shift+x"
rename_tab = "prefix+shift+t"

# Panes: prefix hjkl + direct Alt+arrows (old WezTerm muscle memory)
focus_pane_left = ["prefix+h", "alt+left"]
focus_pane_down = ["prefix+j", "alt+down"]
focus_pane_up = ["prefix+k", "alt+up"]
focus_pane_right = ["prefix+l", "alt+right"]
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
# - 横向分 (down/stack); = 纵向分 (right/side-by-side)
split_horizontal = "prefix+minus"
split_vertical = "prefix+="
close_pane = "prefix+x"
zoom = "prefix+z"
# Optional keyboard resize mode (mouse drag on borders is primary)
resize_mode = "prefix+r"
rename_pane = "prefix+shift+p"
# Default copy_mode is prefix+[ — move it so tab switching can use [ ]
copy_mode = "prefix+e"
edit_scrollback = "prefix+shift+e"

# Navigate mode only (plain keys OK here)
navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
description = "lazygit"
width = "80%"
height = "80%"

[ui]
sidebar_width = 26
mouse_capture = true
copy_on_select = true
confirm_close = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = true
hide_tab_bar_when_single_tab = false
agent_panel_sort = "spaces"

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[experimental]
allow_nested = false
pane_history = false
# Local Kitty graphics in attached clients (WezTerm supports the protocol).
kitty_graphics = true

[advanced]
scrollback_limit_bytes = 10000000

[theme.custom]
# Auto-generated by theme-sync-herdr — do not edit manually
accent = "#000000"
panel_bg = "#000000"
surface0 = "#000000"
surface1 = "#000000"
surface_dim = "#000000"
overlay0 = "#000000"
overlay1 = "#000000"
text = "#000000"
subtext0 = "#000000"
mauve = "#000000"
green = "#000000"
yellow = "#000000"
red = "#000000"
blue = "#000000"
teal = "#000000"
peach = "#000000"
